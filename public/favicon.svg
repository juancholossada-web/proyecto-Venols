<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c">
      <circle cx="50" cy="50" r="26"/>
    </clipPath>
  </defs>

  <!-- Anillo exterior gris oscuro — arco de ~336° con corte en la parte superior derecha (entre las 12 y la 1) -->
  <!-- Empieza en (70, 12) ≈ 297° y termina en (52, 7) ≈ 273°, sentido horario, arco largo -->
  <path d="M 70 12 A 43 43 0 1 1 52 7"
    fill="none"
    stroke="#525252"
    stroke-width="11"
    stroke-linecap="round"/>

  <!-- Círculo interior dorado -->
  <circle cx="50" cy="50" r="26" fill="#C49A28"/>

  <!-- Línea blanca diagonal (noroeste → sureste) recortada al círculo dorado -->
  <line x1="31" y1="31" x2="69" y2="69"
    stroke="white"
    stroke-width="5.5"
    stroke-linecap="round"
    clip-path="url(#c)"/>
</svg>
